# Model settings
model:
  name: "meta-llama/Llama-3.2-1B"
  max_length: 512

# LoRA settings
lora:
  r: 16                    # Rank (higher = more parameters, more memory)
  lora_alpha: 32           # Scaling factor
  lora_dropout: 0.05
  target_modules:          # Which layers to adapt
    - q_proj
    - v_proj
  bias: "none"

# Training settings
training:
  output_dir: "./results"
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4   # Effective batch = 4*4 = 16
  learning_rate: 0.0002
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  fp16: true               # Mixed precision (faster on GPU)

# Dataset settings
data:
  name: "tatsu-lab/alpaca"
  train_split: "train"
  test_size: 0.1           # 10% for validation
  max_samples: null        # null = use all, or set to 1000 for testing

# Hugging Face Hub (for saving model)
hub:
  repo_name: "Jeel3011/llama-alpaca-finetuned"  # Change this
  push_to_hub: true